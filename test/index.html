<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
<html>

<head>
	<style>
		body {
			/* 设置动画名称和持续时间 */
			animation: fadeIn 2s;
		}

		/* 定义动画关键帧 */
		@keyframes fadeIn {
			0% {
				opacity: 0;
			}

			100% {
				opacity: 1;
			}
		}
	</style>
</head>

<body>
	<h1>欢迎来到我的网站！</h1>
</body>

</html>
